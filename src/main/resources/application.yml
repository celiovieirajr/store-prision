spring:
  application:
    name: prision

  datasource:
    url: jdbc:h2:mem:prisiondb
    driverClassName: org.h2.Driver
    username: sa
    password:

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update

  h2:
    console:
      enabled: true
      path: /h2-console

  main:
    allow-circular-references: true

server:
  port: 3000
